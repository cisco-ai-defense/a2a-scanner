policy_name: default
policy_version: "1.0"
description: "Default balanced scan policy for A2A protocol analysis"

disabled_rules: []

severity_overrides: {}

analyzers:
  static: true
  spec: true
  endpoint: true
  llm: false

llm_analysis:
  enabled: false
  model: null
  max_output_tokens: 8192

finding_output:
  dedupe_exact_findings: true
  dedupe_same_issue_per_location: true
  attach_policy_fingerprint: true
